<section class="section home-section home-contact" id="contact" aria-labelledby="contact-heading">
  <div class="home-contact__grid">
    <header class="home-contact__header">
      <h2 id="contact-heading" class="home-contact__title type-band-title">Contact me</h2>
      <div class="home-contact__intro type-body-lead">
        Want to say hi, share feedback, or ask about my work? Drop a note.
      </div>
    </header>

    <div class="home-contact__card card">
      <iframe
        class="home-contact__embed"
        data-tally-src="https://tally.so/embed/ob076V?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1&formEventsForwarding=1"
        loading="lazy"
        width="100%"
        height="300"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        title="Contact form"
      ></iframe>
      <script>
        var d = document,
          w = "https://tally.so/widgets/embed.js",
          v = function () {
            "undefined" != typeof Tally
              ? Tally.loadEmbeds()
              : d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function (e) {
                  e.src = e.dataset.tallySrc;
                });
          };
        if ("undefined" != typeof Tally) v();
        else if (d.querySelector('script[src="' + w + '"]') == null) {
          var s = d.createElement("script");
          s.src = w;
          s.onload = v;
          s.onerror = v;
          d.body.appendChild(s);
        }
      </script>
    </div>
  </div>
</section>
