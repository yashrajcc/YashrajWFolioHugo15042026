{{- if .Site.Params.show_a11y_banner | default true -}}
<div class="a11y-strip" role="region" aria-label="Accessibility options">
  <p class="a11y-strip__text">{{ .Site.Params.a11y_message | default "For a simplified experience, switch to Accessible Mode." }}</p>
  <button
    type="button"
    class="btn btn--a11y"
    id="a11y-toggle"
    aria-pressed="false"
    data-a11y-enable="{{ .Site.Params.a11y_enable_label | default "Enable Accessible Mode" }}"
    data-a11y-disable="{{ .Site.Params.a11y_disable_label | default "Disable Accessible Mode" }}"
  >{{ .Site.Params.a11y_enable_label | default "Enable Accessible Mode" }}</button>
</div>
{{- end -}}
