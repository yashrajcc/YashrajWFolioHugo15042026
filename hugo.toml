baseURL = 'https://work.yashraj.cc/'
languageCode = 'en-us'
title = 'Portfolio'
disableKinds = ['taxonomy', 'term']
relativeURLs = false

[markup]
  # Authored content only: allows shortcode HTML (callout, quote) without Goldmark replacing it.
  [markup.goldmark.extensions]
    footnote = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

[params]
