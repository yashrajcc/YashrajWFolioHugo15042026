baseURL = 'https://work.yashraj.cc/'
languageCode = 'en-us'
title = 'Portfolio'
disableKinds = ['taxonomy', 'term']
relativeURLs = false

[markup]
  # Authored content only: allows shortcode HTML (callout, quote) without Goldmark replacing it.
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

[params]
  author = "Yashraj Wadalkar"
  brand = "yashraj.cc"
  resume_url = "/resume.pdf"
  contact_email = "hello@yashraj.cc"
  show_a11y_banner = true
  a11y_message = "For a simplified experience, switch to Accessible Mode."
  a11y_enable_label = "Enable Accessible Mode"
  a11y_disable_label = "Disable Accessible Mode"

